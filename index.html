 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="ring">
            <h2 id="timer">00:00:00</h2>
        </div>

        <div class="buttons">
            <button onclick="start()" id="startbtn" class="start">
                ▶️ Start
            </button>

            <button onclick="stopfunc()" class="stop" id="stopbtn">
               ⏹️ Stop
            </button>

            <button onclick="reset()" class="reset" id="restbtn">
              🔄  Reset
            </button>
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
